version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: helpdesk-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-helpdesk_pass}
      POSTGRES_DB: ${POSTGRES_DB:-helpdesk}
      POSTGRES_USER: ${POSTGRES_USER:-helpdesk_user}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
